name: product-readiness

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  product-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Bash syntax check
        run: bash -n scripts/check_product_readiness.sh

      - name: Run product-readiness check
        run: scripts/check_product_readiness.sh
